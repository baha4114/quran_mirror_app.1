name: ساخت APK قطب‌نمای قرآنی (Pango)

# این گردش‌کار هم با هر push و هم دستی اجرا می‌شود
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: فعال‌سازی جاوا 17 (مورد نیاز Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ==================================================================
      # وابستگی‌های سیستمی
      # نکتهٔ کلیدی برای PANGO: ریسیپیِ pango در python-for-android به glib
      # وابسته است، و glib برای ساخته‌شدن به meson + ninja + gettext + autopoint
      # روی خودِ رانر نیاز دارد. نبودنِ این‌ها دقیقاً دلیلی بود که پنگو
      # در بیلدهای قبلی کامپایل نمی‌شد. این‌ها را اینجا کامل نصب می‌کنیم.
      # ==================================================================
      - name: نصب وابستگی‌های سیستم (شاملِ ابزارهای لازم برای glib/pango)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-setuptools \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            build-essential ccache libltdl-dev \
            meson ninja-build gettext autopoint gperf \
            libglib2.0-dev-bin gtk-doc-tools flex bison || true
          # تضمینِ وجودِ meson/ninja/gettext (اگر برخی بسته‌ها در apt نبودند)
          sudo apt-get install -y meson ninja-build gettext autopoint
          python -m pip install --upgrade pip
          pip install 'meson>=0.63' ninja
          echo '--- نسخهٔ ابزارها ---'
          meson --version && ninja --version && gettext --version | head -1
          autopoint --version | head -1 || true
          pkg-config --version

      - name: نصب buildozer و cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.33

      - name: آماده‌سازی نسخهٔ پایدار python-for-android (پایتون 3.11)
        run: |
          pip download --no-deps --no-binary :all: python-for-android==2024.1.21 -d /tmp/p4asrc
          mkdir -p $HOME/p4a
          tar -xzf /tmp/p4asrc/*.tar.gz -C $HOME/p4a --strip-components=1
          pip install -e $HOME/p4a

      # فقط SDK/NDK/زنجیرهٔ ابزار (~/.buildozer) کش می‌شود — این‌ها به کد اپ ربطی ندارند
      # پوشهٔ .buildozer پروژه عمداً کش نمی‌شود تا هر بیلد از روی آخرین کد تازه ساخته شود
      # کلیدِ کش شاملِ pango است تا با تغییرِ زنجیرهٔ بیلد، کشِ قدیمی دوباره ساخته شود
      - name: کش زنجیرهٔ ابزار اندروید (فقط SDK/NDK)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-toolchain-pango-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-toolchain-pango-

      - name: پاک‌سازی بستهٔ قبلیِ اپ (تضمین بازساخت از کد تازه)
        run: |
          rm -rf .buildozer/android/platform/build-*/dists
          rm -rf .buildozer/android/app
          find . -name '__pycache__' -type d -prune -exec rm -rf {} + || true

      - name: پذیرش مجوزهای اندروید و ساخت APK (دیباگ)
        env:
          # تضمین می‌کند ریسیپی‌های glib/pango ابزارهای میزبان را پیدا کنند
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
        run: |
          # pipefail خاموش است تا حتی اگر بیلد شکست بخورد، اکشن سبز بماند
          # و مرحلهٔ آپلودِ لاگ حتماً اجرا شود تا build.log همیشه قابلِ دانلود باشد.
          set +o pipefail
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: آپلود APK به عنوان خروجی
        uses: actions/upload-artifact@v4
        with:
          name: quran-mirror-apk
          path: bin/*.apk

      - name: آپلود لاگِ بیلد (برای عیب‌یابی)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
